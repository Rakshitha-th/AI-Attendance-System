<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Face Attendance</title>

<style>
body{
    margin:0;
    background:#020617;
    color:white;
    font-family:Arial;
}

.container{
    display:flex;
    height:100vh;
}

.left{
    width:250px;
    background:#0f172a;
    padding:20px;
}

.center{
    flex:1;
    display:flex;
    flex-direction:column;
}

.right{
    width:350px;
    background:#0f172a;
    padding:20px;
}

.card{
    background:#111827;
    padding:20px;
    margin-bottom:15px;
    border-radius:10px;
    text-align:center;
}

.video img{
    width:100%;
    height:100%;
}

table{
    width:100%;
    color:white;
}

th,td{
    padding:10px;
    border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
    <div class="card">
        <h2 id="reg">{{ registered_count }}</h2>
        <p>Registered</p>
    </div>

    <div class="card">
        <h2 id="faces">{{ face_count }}</h2>
        <p>Faces</p>
    </div>
</div>

<!-- CENTER -->
<div class="center">
    <h2 style="text-align:center;">LIVE FACE RECOGNITION</h2>

    <div class="video">
        <img src="/video">
    </div>
</div>

<!-- RIGHT -->
<div class="right">
    <h3>Today's Attendance</h3>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody id="table">
            {% for row in attendance %}
            <tr>
                <td>{{ row[0] }}</td>
                <td>{{ row[1] }}</td>
                <td>{{ row[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</div>

<script>
setInterval(async () => {

    const res = await fetch('/data');
    const data = await res.json();

    document.getElementById("faces").innerText = data.face_count;

    let table = document.getElementById("table");
    table.innerHTML = "";

    data.attendance.forEach(r => {
        table.innerHTML += `
        <tr>
            <td>${r[0]}</td>
            <td>${r[1]}</td>
            <td>${r[2]}</td>
        </tr>`;
    });

}, 3000);
</script>

</body>
</html>
